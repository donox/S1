<h1>Project Files</h1>

<div class="warning-box" style="font-size:0.8rem">
  <strong>Naming convention:</strong> <code>ProjectName_Stage_Version_Date.ext</code>
  &nbsp;·&nbsp; e.g. <code>FlowerDesign_Vector_V2_230424.svg</code>
</div>

<div class="filter-bar">
  <div>
    <label>Extension</label>
    <select id="f-ext">
      <option value="">All</option>
      <option value="svg">svg</option>
      <option value="lbrn">lbrn</option>
      <option value="xcs">xcs</option>
      <option value="png">png</option>
      <option value="xcf">xcf</option>
    </select>
  </div>
  <div>
    <label>Tag</label>
    <select id="f-tag">
      <option value="">All</option>
      <option value="keep">Keep</option>
      <option value="review">Review</option>
      <option value="delete">Delete</option>
    </select>
  </div>
  <button class="btn btn-secondary btn-sm" id="btn-filter-files">Filter</button>
  <button class="btn btn-primary btn-sm" id="btn-scan">Scan Directory</button>
  <span id="scan-result" style="font-size:0.8rem;color:var(--text-muted)"></span>
</div>

<div id="files-banner"></div>
<div id="files-list"></div>
