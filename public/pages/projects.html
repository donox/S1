<h1 class="mb-4">Projects</h1>

<div id="proj-status-counts" class="d-flex gap-2 flex-wrap mb-3"></div>

<div class="d-flex gap-2 align-items-center mb-4">
  <select class="form-select form-select-sm" id="proj-status-filter" style="width:auto">
    <option value="" selected>All</option>
    <option value="active">Active</option>
    <option value="paused">Paused</option>
    <option value="complete">Complete</option>
    <option value="abandoned">Abandoned</option>
  </select>
  <button class="btn btn-primary btn-sm" id="btn-new-project">+ New Project</button>
</div>

<div id="project-form-wrap"></div>
<div id="projects-list"></div>
