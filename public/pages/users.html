<h1 class="mb-4">Users</h1>

<div class="card border-primary border-2 mb-4">
  <div class="card-body">
    <h2 class="h5 mb-3 text-primary">Add User</h2>
    <div class="row g-2 align-items-end">
      <div class="col-md">
        <label class="form-label small">Name</label>
        <input class="form-control form-control-sm" id="nu-name" type="text" placeholder="e.g. Don">
      </div>
      <div class="col-auto d-flex align-items-end pb-1">
        <div class="form-check mb-0">
          <input class="form-check-input" id="nu-default" type="checkbox">
          <label class="form-check-label small" for="nu-default">Set as default</label>
        </div>
      </div>
      <div class="col-auto">
        <button class="btn btn-primary btn-sm" id="btn-add-user">Add User</button>
      </div>
    </div>
  </div>
</div>

<div id="users-list"></div>
