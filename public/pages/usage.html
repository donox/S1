<h1>Usage Log</h1>

<div class="stats-strip" id="usage-stats"></div>

<div class="inline-form" id="usage-form">
  <h2>Log a Session</h2>
  <div class="form-row">
    <div><label>Date</label><input id="u-date" type="date"></div>
    <div><label>Material</label><input id="u-material" type="text" placeholder="e.g. Walnut"></div>
    <div><label>Operation</label>
      <select id="u-operation">
        <option value="">—</option>
        <option value="engrave">Engrave</option>
        <option value="score">Score</option>
        <option value="cut">Cut</option>
        <option value="mixed">Mixed</option>
      </select>
    </div>
    <div style="flex:1"><label>Project Name</label><input id="u-project" type="text"></div>
  </div>
  <div class="form-row">
    <div><label>Duration (min)</label><input id="u-duration" type="number" min="1"></div>
    <div style="flex:1"><label>File Used</label><input id="u-file" type="text"></div>
    <div><label>Setting (optional)</label><select id="u-setting"><option value="">—</option></select></div>
    <div><label>Outcome</label>
      <select id="u-outcome">
        <option value="">—</option>
        <option value="success">Success</option>
        <option value="partial">Partial</option>
        <option value="failed">Failed</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div style="flex:1"><label>Notes</label><textarea id="u-notes"></textarea></div>
  </div>
  <button class="btn btn-primary" id="u-save">Log Session</button>
</div>

<div id="usage-banner"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr><th>Date</th><th>Material</th><th>Op</th><th>Project</th><th>Duration</th><th>Outcome</th><th>Notes</th><th></th></tr>
    </thead>
    <tbody id="usage-body"></tbody>
  </table>
</div>
