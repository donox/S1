<h1 class="mb-4">Notes &amp; Learning Tracker</h1>

<div class="card card-body mb-3">
  <h2 class="h6 mb-3">Add Note</h2>
  <div class="row g-2 mb-2">
    <div class="col-md">
      <label class="form-label small">Topic</label>
      <input class="form-control form-control-sm" id="n-topic" type="text" placeholder="e.g. Wood engraving">
    </div>
    <div class="col-md-auto">
      <label class="form-label small">Status</label>
      <select class="form-select form-select-sm" id="n-status">
        <option value="note">Note</option>
        <option value="question">Question</option>
        <option value="try">Try This</option>
        <option value="learned">Learned</option>
      </select>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label small">Content</label>
    <textarea class="form-control form-control-sm" id="n-content" rows="3"></textarea>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-primary btn-sm" id="n-save">Add</button>
    <button class="btn btn-secondary btn-sm" id="n-export">Export to Clipboard</button>
  </div>
</div>

<ul class="nav nav-pills mb-3" id="notes-tabs">
  <li class="nav-item"><button class="nav-link active" data-status="">All</button></li>
  <li class="nav-item"><button class="nav-link" data-status="note">Notes</button></li>
  <li class="nav-item"><button class="nav-link" data-status="question">Questions</button></li>
  <li class="nav-item"><button class="nav-link" data-status="try">Try This</button></li>
  <li class="nav-item"><button class="nav-link" data-status="learned">Learned</button></li>
</ul>

<div id="notes-list"></div>
